# Prometheus configuration for MLOps Real Estate Platform
# Scrapes the inference API metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "inference-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "inference-api-service.mlops-api.svc.cluster.local:8000"
        labels:
          service: "inference-api"
          namespace: "mlops-api"
