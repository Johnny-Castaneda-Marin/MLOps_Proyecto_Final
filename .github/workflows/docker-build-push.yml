name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "streamlit/**"
      - "airflow/**"
      - "locust/**"
      - "mlflow/**"
      - "mlops_core/**"
  workflow_dispatch:

# Necesario para que el job update-manifests pueda commitear los tags fijados.
permissions:
  contents: write

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-puj

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      streamlit: ${{ steps.filter.outputs.streamlit }}
      airflow: ${{ steps.filter.outputs.airflow }}
      locust: ${{ steps.filter.outputs.locust }}
      mlflow: ${{ steps.filter.outputs.mlflow }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'mlops_core/**'
            streamlit:
              - 'streamlit/**'
            airflow:
              - 'airflow/**'
              - 'mlops_core/**'
              - 'pyproject.toml'
            locust:
              - 'locust/**'
            mlflow:
              - 'mlflow/**'

  build-api:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-streamlit:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.streamlit == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Debug - list files
        run: ls -la && ls -la streamlit/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: streamlit/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-streamlit:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-airflow:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.airflow == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: airflow/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-airflow:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-airflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-locust:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.locust == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Locust image
        uses: docker/build-push-action@v6
        with:
          context: locust
          file: locust/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-locust:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-locust:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mlflow:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mlflow == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push MLflow image
        uses: docker/build-push-action@v6
        with:
          context: mlflow
          file: mlflow/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-mlflow:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-mlflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Opción B: fija (pin) los tags de imagen al SHA del commit en los manifiestos
  # y en values.yaml, y commitea de vuelta a main. Argo CD sincroniza los
  # manifiestos con tags inmutables y `helm upgrade` lee el tag fijado de
  # values.yaml -> despliegues reproducibles, sin depender de `latest`.
  # ---------------------------------------------------------------------------
  update-manifests:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-api, build-streamlit, build-airflow, build-locust, build-mlflow]
    if: always() && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Pin de tags de imagen al SHA
        env:
          TAG: ${{ steps.sha.outputs.short_sha }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          CH_API: ${{ needs.detect-changes.outputs.api }}
          CH_STREAMLIT: ${{ needs.detect-changes.outputs.streamlit }}
          CH_AIRFLOW: ${{ needs.detect-changes.outputs.airflow }}
          CH_LOCUST: ${{ needs.detect-changes.outputs.locust }}
          CH_MLFLOW: ${{ needs.detect-changes.outputs.mlflow }}
        run: |
          set -euo pipefail
          pin_deploy() { # $1=archivo  $2=sufijo-imagen
            sed -i -E "s#(image: ${PREFIX}-$2:).*#\1${TAG}#" "$1"
            echo "Pinned $1 -> ${PREFIX}-$2:${TAG}"
          }
          built() { [ "$DISPATCH" = "true" ] || [ "$1" = "true" ]; }

          built "$CH_API"       && pin_deploy k8s/api/deployment.yaml       api       || true
          built "$CH_STREAMLIT" && pin_deploy k8s/streamlit/deployment.yaml streamlit || true
          built "$CH_LOCUST"    && pin_deploy k8s/locust/deployment.yaml    locust    || true
          built "$CH_MLFLOW"    && pin_deploy k8s/mlflow/deployment.yaml    mlflow    || true
          if built "$CH_AIRFLOW"; then
            yq -i '.images.airflow.tag = strenv(TAG)' k8s/airflow/values.yaml
            echo "Pinned k8s/airflow/values.yaml -> images.airflow.tag=${TAG}"
          fi

      - name: Commit y push de los tags fijados
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          if git diff --cached --quiet; then
            echo "Sin cambios de tags que commitear."
          else
            git commit -m "ci: pin de imagenes a ${{ steps.sha.outputs.short_sha }} [skip ci]"
            git push origin main
          fi
