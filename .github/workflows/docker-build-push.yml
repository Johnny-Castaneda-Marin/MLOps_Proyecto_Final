name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "streamlit/**"
      - "airflow/**"
      - "locust/**"
      - "mlops_core/**"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-puj

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      streamlit: ${{ steps.filter.outputs.streamlit }}
      airflow: ${{ steps.filter.outputs.airflow }}
      locust: ${{ steps.filter.outputs.locust }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'mlops_core/**'
            streamlit:
              - 'streamlit/**'
            airflow:
              - 'airflow/**'
            locust:
              - 'locust/**'

  build-api:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-streamlit:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.streamlit == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: streamlit/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-streamlit:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-airflow:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.airflow == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: airflow
          file: airflow/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-airflow:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-airflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-locust:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.locust == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Locust image
        uses: docker/build-push-action@v6
        with:
          context: locust
          file: locust/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-locust:${{ steps.sha.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-locust:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
