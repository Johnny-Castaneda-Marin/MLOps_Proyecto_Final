# Grafana dashboard provisioning configuration
apiVersion: 1

providers:
  - name: "MLOps Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
