# Versión de Airflow que corre la imagen custom. El chart usa este valor para
# decidir qué componentes/comandos arrancar (en 2.x => webserver, no api-server).
airflowVersion: "2.9.3"
defaultAirflowTag: "2.9.3"
images:
  airflow:
    repository: johnnycastaneda10/mlops-puj-airflow
    tag: latest
    pullPolicy: Always
executor: LocalExecutor
postgresql:
  enabled: true
  # Bitnami movió sus imágenes versionadas a docker.io/bitnamilegacy el
  # 28-ago-2025 y borró el catálogo público, dejando rota la etiqueta por
  # defecto del chart (bitnami/postgresql:16.1.0-debian-11-r15 -> manifest
  # unknown). Apuntamos al repositorio legacy de solo lectura, que conserva
  # esa misma etiqueta, para poder descargar la imagen.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.1.0-debian-11-r15
  auth:
    username: airflow
    password: airflow
    database: airflow
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__CORE__HOSTNAME_CALLABLE
    value: "airflow.utils.net.get_host_ip_address"
  - name: DATA_API_URL
    value: "http://data-api-service.mlops-data-api.svc.cluster.local"
  - name: POSTGRES_RAW_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/raw_db"
  - name: POSTGRES_CLEAN_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/clean_db"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow-service.mlops-mlflow.svc.cluster.local:5000"
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio-service.mlops-storage.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin123"
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: airflow/dags
    period: 30s
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
scheduler:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  logGroomerSidecar:
    enabled: true
webserver:
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  startupProbe:
    timeoutSeconds: 60
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 60
    failureThreshold: 10
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 60
    failureThreshold: 10
    periodSeconds: 10
config:
  core:
    colored_console_log: "False"
  logging:
    remote_logging: "False"
    logging_level: "INFO"
  webserver:
    expose_config: "True"
  api:
    auth_backends: "airflow.api.auth.backend.basic_auth"
webserverSecretKey: mlops-airflow-secret-key
migrateDatabaseJob:
  enabled: true
# Job que crea el usuario inicial. En el chart 1.x se controla con useHelmHooks,
# no con 'enabled' (esa propiedad no existe en el schema y rompe la validación).
createUserJob:
  useHelmHooks: true
# Usuario admin por defecto. Es una clave de NIVEL RAÍZ en el chart oficial
# (no va anidada bajo webserver). Campos en camelCase: firstName / lastName.
defaultUser:
  enabled: true
  username: admin
  password: admin
  firstName: Admin
  lastName: User
  email: admin@example.com
  role: Admin
logs:
  persistence:
    enabled: false
