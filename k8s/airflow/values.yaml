images:
  airflow:
    repository: johnnycastaneda10/mlops-puj-airflow
    tag: latest
    pullPolicy: Always
executor: LocalExecutor
postgresql:
  enabled: true
  auth:
    username: airflow
    password: airflow
    database: airflow
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__CORE__HOSTNAME_CALLABLE
    value: "airflow.utils.net.getfqdn"
  - name: DATA_API_URL
    value: "http://data-api-service.mlops-data-api.svc.cluster.local"
  - name: POSTGRES_RAW_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/raw_db"
  - name: POSTGRES_CLEAN_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/clean_db"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow-service.mlops-mlflow.svc.cluster.local:5000"
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio-service.mlops-storage.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin123"
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: airflow/dags
    period: 30s
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
scheduler:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  logGroomerSidecar:
    enabled: true
webserver:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
apiServer:
  enabled: true
config:
  core:
    colored_console_log: "False"
  logging:
    remote_logging: "False"
    logging_level: "INFO"
  webserver:
    expose_config: "True"
webserverSecretKey: mlops-airflow-secret-key
migrateDatabaseJob:
  enabled: true
createUserJob:
  enabled: true
defaultUser:
  enabled: true
  username: admin
  password: admin
  firstname: Admin
  lastname: User
  email: admin@example.com
  role: Admin
logs:
  persistence:
    enabled: false
