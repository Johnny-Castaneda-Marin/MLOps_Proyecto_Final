images:
  airflow:
    repository: johnnycastaneda10/mlops-puj-airflow
    tag: latest
    pullPolicy: IfNotPresent

executor: LocalExecutor

data:
  metadataSecretName: ~
  metadataConnection:
    user: mlops_user
    pass: mlops1234
    host: postgres-service.mlops-data.svc.cluster.local
    port: 5432
    db: airflow_db
    sslmode: disable

postgresql:
  enabled: false

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: DATA_API_URL
    value: "http://data-api-service.mlops-data-api.svc.cluster.local"
  - name: POSTGRES_RAW_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/raw_db"
  - name: POSTGRES_CLEAN_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/clean_db"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow-service.mlops-mlflow.svc.cluster.local:5000"
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio-service.mlops-storage.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin123"
  # Conexión S3 hacia MinIO para remote logging (RF: logs centralizados)
  - name: AIRFLOW_CONN_MINIO_S3
    value: "aws://minioadmin:minioadmin123@/?endpoint_url=http%3A%2F%2Fminio-service.mlops-storage.svc.cluster.local%3A9000"

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: airflow/dags
    period: 30s

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

scheduler:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

webserver:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Airflow 3.x usa api-server en lugar de webserver
apiServer:
  enabled: true

# Remote logging a MinIO (S3) — evita served-logs HTTP y PVC
config:
  core:
    colored_console_log: "False"
  logging:
    remote_logging: "True"
    remote_base_log_folder: "s3://mlflow/airflow-logs"
    remote_log_conn_id: "minio_s3"
    encrypt_s3_logs: "False"
  webserver:
    expose_config: "True"

logs:
  persistence:
    enabled: false
