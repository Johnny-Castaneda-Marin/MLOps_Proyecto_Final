images:
  airflow:
    repository: johnnycastaneda10/mlops-puj-airflow
    tag: latest
    pullPolicy: Always

executor: LocalExecutor

data:
  metadataSecretName: ~
  metadataConnection:
    user: mlops_user
    pass: mlops1234
    host: postgres-service.mlops-data.svc.cluster.local
    port: 5432
    db: airflow_db
    sslmode: disable

postgresql:
  enabled: false

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: DATA_API_URL
    value: "http://data-api-service.mlops-data-api.svc.cluster.local"
  - name: POSTGRES_RAW_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/raw_db"
  - name: POSTGRES_CLEAN_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/clean_db"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow-service.mlops-mlflow.svc.cluster.local:5000"
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio-service.mlops-storage.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin123"

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: airflow/dags
    period: 30s

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "4000m"
    memory: "3Gi"

scheduler:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "4000m"
      memory: "1Gi"

webserver:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# Deshabilitar el api-server (requiere Airflow 2.10+, nuestra imagen es 2.9.1)
apiServer:
  enabled: false
