images:
  airflow:
    repository: johnnycastaneda10/mlops-puj-airflow
    tag: latest
    pullPolicy: IfNotPresent
executor: LocalExecutor
data:
  metadataSecretName: ~
  metadataConnection:
    user: mlops_user
    pass: mlops1234
    host: postgres-service.mlops-data.svc.cluster.local
    port: 5432
    db: airflow_db
    sslmode: disable
postgresql:
  enabled: false
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: DATA_API_URL
    value: "http://data-api-service.mlops-data-api.svc.cluster.local"
  - name: POSTGRES_RAW_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/raw_db"
  - name: POSTGRES_CLEAN_CONN
    value: "postgresql://mlops_user:mlops1234@postgres-service.mlops-data.svc.cluster.local:5432/clean_db"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow-service.mlops-mlflow.svc.cluster.local:5000"
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio-service.mlops-storage.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin123"
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: airflow/dags
    period: 30s
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
scheduler:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
webserver:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
# Airflow 3.x usa api-server en lugar de webserver
apiServer:
  enabled: true
# Logs LOCALES y persistentes en un PVC compartido por los componentes de
# Airflow (scheduler, api-server, triggerer, dag-processor). No se usa logging
# remoto (S3/MinIO): los logs viven en el clúster y la UI los lee desde el
# volumen compartido.
config:
  core:
    colored_console_log: "False"
  logging:
    remote_logging: "False"
  webserver:
    expose_config: "True"
logs:
  persistence:
    enabled: true
    # El chart 1.15.0 fuerza ReadWriteMany en su PVC interno, lo cual no soporta
    # la StorageClass de kind (local-path). Por eso usamos un PVC propio,
    # ReadWriteOnce, definido en k8s/airflow/logs-pvc.yaml (lo crea Argo CD).
    # En un clúster de un solo nodo, RWO permite que todos los pods de Airflow
    # (scheduler, api-server, triggerer, dag-processor) compartan el volumen,
    # porque RWO limita por NODO, no por pod.
    existingClaim: airflow-logs
