apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops-monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "inference-api"
        metrics_path: /metrics
        static_configs:
          - targets:
              - "inference-api-service.mlops-api.svc.cluster.local:8000"
            labels:
              service: "inference-api"
              namespace: "mlops-api"
