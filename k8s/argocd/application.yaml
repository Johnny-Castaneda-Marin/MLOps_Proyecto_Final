apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-proyecto-final
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/description: |
      MLOps Real Estate Platform - GitOps declarative deployment.
      Syncs all Kubernetes manifests from k8s/ directory recursively.
      Each component deploys to its own namespace.
spec:
  project: default
  source:
    repoURL: https://github.com/Johnny-Castaneda-Marin/MLOps_Proyecto_Final.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
      exclude: '{airflow/**}'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
