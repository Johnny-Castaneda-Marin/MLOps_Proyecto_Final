apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: johnnycastaneda10/mlops-puj-mlflow:latest
          imagePullPolicy: Always
          command:
            - mlflow
            - server
            - --backend-store-uri
            - $(BACKEND_URI)
            - --default-artifact-root
            - $(ARTIFACT_URI)
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
          ports:
            - containerPort: 5000
          env:
            - name: BACKEND_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-secret
                  key: BACKEND_URI
            - name: ARTIFACT_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-secret
                  key: ARTIFACT_URI
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: mlflow-secret
                  key: MLFLOW_S3_ENDPOINT_URL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 15
